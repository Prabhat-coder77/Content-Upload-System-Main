spring:
  profiles:
    active: dev
  application:
    name: coursecontent
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:coursecontent}
    username: ${DB_USER:postgres}
    password: ${DB_PASSWORD:postgres}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect
  flyway:
    enabled: true
    baseline-on-migrate: true

  servlet:
    multipart:
      max-file-size: ${MAX_FILE_SIZE:50MB}
      max-request-size: ${MAX_REQUEST_SIZE:50MB}

server:
  port: 8080

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: always

app:
  security:
    cors:
      allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:5173}
    jwt:
      secret: ${JWT_SECRET:veryLongSecretKeyForJwtGenerationWhichShouldBeChangedInProductionUse}
      expirationSec: ${JWT_EXPIRATION_SEC:86400}
      refreshExpirationDays: ${JWT_REFRESH_EXPIRATION_DAYS:7}
  storage:
    type: ${STORAGE_TYPE:LOCAL}
    local:
      root: ${STORAGE_LOCAL_ROOT:uploads}
    s3:
      bucket: ${S3_BUCKET:your-bucket}
      prefix: ${S3_PREFIX:uploads/}
      region: ${S3_REGION:us-east-1}
  upload:
    allowed-types:
      - application/pdf
      - video/mp4
      - image/jpeg
      - image/png
    allowed-extensions:
      - pdf
      - mp4
      - jpg
      - jpeg
      - png
